name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Install bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Generate Cloudflare env types
      run: bun run cf-typegen

    - name: Audit direct dependencies for known vulnerabilities
      run: bash scripts/audit-direct.sh

    - name: Run oxlint and oxfmt
      run: bun run check

    - name: Run Tests
      run: bun run test

    - name: Run TypeScript Type Check (tsgo)
      run: bun run typecheck

    - name: Build Project
      run: bun run build
